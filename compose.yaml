services:
  worker:
    image: localhost/webcam-follow-worker:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: webcam-follow-worker
    env_file:
      - .env
    environment:
      CONTAINER: "1"
      SERVICE_MODE: worker
      SHOW_PREVIEW: "false"
      YOLO_DEVICE: cpu
      WORKER_HOST: "0.0.0.0"
      WORKER_PORT: "8090"
      SNAPSHOT_DIR: /app/snapshots
      DATA_DIR: /app/data
    expose:
      - "8090"
    volumes:
      - ./snapshots:/app/snapshots:z
      - ./data:/app/data:z
    # docker-compose con Podman ignora userns_mode: keep-id; usar UID/GID del host
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      - webcam_follow
    restart: unless-stopped
    # Webcam USB local (descomenta en el host):
    # devices:
    #   - /dev/video0:/dev/video0

  web:
    image: localhost/webcam-follow-web:latest
    build:
      context: .
      dockerfile: Containerfile.web
    container_name: webcam-follow-web
    depends_on:
      - worker
    env_file:
      - .env
    environment:
      CONTAINER: "1"
      SERVICE_MODE: web
      WEB_ENABLED: "true"
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8080"
      WORKER_URL: http://worker:8090
      WORKER_TOKEN: ${WORKER_TOKEN:-}
      SNAPSHOT_DIR: /app/snapshots
      DATA_DIR: /app/data
    ports:
      - "8080:8080"
    volumes:
      - ./snapshots:/app/snapshots:z
      - ./data:/app/data:z
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      - webcam_follow
    restart: unless-stopped

  # Perfil legacy: un solo contenedor (web + detección)
  monolith:
    profiles: [monolith]
    image: localhost/webcam-follow:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: webcam-follow
    env_file:
      - .env
    environment:
      CONTAINER: "1"
      SERVICE_MODE: monolith
      SHOW_PREVIEW: "false"
      WEB_ENABLED: "true"
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8080"
      YOLO_DEVICE: cpu
      SNAPSHOT_DIR: /app/snapshots
      DATA_DIR: /app/data
    ports:
      - "8080:8080"
    volumes:
      - ./snapshots:/app/snapshots:z
      - ./data:/app/data:z
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      - webcam_follow
    restart: unless-stopped

networks:
  webcam_follow:
    name: webcam-follow
    driver: bridge
